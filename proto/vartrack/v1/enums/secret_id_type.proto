syntax = "proto3";

package vartrack.v1;

// SecretIDType specifies how the AppRole secret_id is supplied to Vault.
enum SecretIDType {
  SECRET_ID_TYPE_UNSPECIFIED = 0;
  // secret_id is provided as a plain string value.
  PLAIN                      = 1;
  // secret_id is read from the named environment variable at runtime.
  ENVIRONMENT                = 2;
}
