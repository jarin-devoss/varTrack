syntax = "proto3";

package vartrack.v1;

import "vartrack/v1/enums/strategy.proto";
import "vartrack/v1/utils/secret_ref.proto";
import "buf/validate/validate.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/duration.proto";

message S3Config {
  optional string tag = 1 [(google.api.field_behavior) = OPTIONAL];
  string endpoint = 2 [
    (buf.validate.field).string.uri = true,
    (google.api.field_behavior) = REQUIRED
  ];
  optional string region = 3 [(google.api.field_behavior) = OPTIONAL];
  string bucket = 4 [
    (buf.validate.field).string.min_len = 1,
    (google.api.field_behavior) = REQUIRED
  ];
  optional string prefix = 5 [(google.api.field_behavior) = OPTIONAL];
  optional SecretRef access_key_id = 6 [(google.api.field_behavior) = OPTIONAL];
  optional SecretRef secret_access_key = 7 [(google.api.field_behavior) = OPTIONAL];
  optional SecretRef session_token = 8 [(google.api.field_behavior) = OPTIONAL];
  bool use_iam_role = 9 [(google.api.field_behavior) = OPTIONAL];
  bool env_as_prefix = 10 [(google.api.field_behavior) = OPTIONAL];
  Strategy update_strategy = 11 [(buf.validate.field).enum.defined_only = true];
  bool one_file_per_key = 12 [(google.api.field_behavior) = OPTIONAL];
  optional string file_pattern = 13 [(google.api.field_behavior) = OPTIONAL];
  map<string, string> object_metadata = 14 [(google.api.field_behavior) = OPTIONAL];
  optional string content_type = 15 [(google.api.field_behavior) = OPTIONAL];
  optional string server_side_encryption = 16 [
    (buf.validate.field).string = {in: ["AES256", "aws:kms", ""]},
    (google.api.field_behavior) = OPTIONAL
  ];
  optional string kms_key_id = 17 [(google.api.field_behavior) = OPTIONAL];
  bool enable_versioning = 18 [(google.api.field_behavior) = OPTIONAL];
  optional string version_id = 19 [(google.api.field_behavior) = OPTIONAL];
  bool force_path_style = 20 [(google.api.field_behavior) = OPTIONAL];
  google.protobuf.Duration timeout = 21 [
    (buf.validate.field).duration.gte = {seconds: 1},
    (google.api.field_behavior) = OPTIONAL
  ];
  int32 max_concurrency = 22 [
    (buf.validate.field).int32 = {gte: 1, lte: 100},
    (google.api.field_behavior) = OPTIONAL
  ];
  int64 part_size = 23 [
    (buf.validate.field).int64.gte = 5242880,
    (google.api.field_behavior) = OPTIONAL
  ];
  bool verify_ssl = 24 [(google.api.field_behavior) = OPTIONAL];
  optional string ssl_ca_cert = 25 [(google.api.field_behavior) = OPTIONAL];
}
