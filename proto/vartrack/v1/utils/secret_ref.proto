syntax = "proto3";

package vartrack.v1;

// SecretRef represents a value that can be provided inline, read from a file,
// or resolved from an external secret manager at runtime.
//
// Three forms are accepted in CUE bundles:
//
//   token: "ghp_abc123"                  // inline plain string
//   token: {file: "/run/secrets/token"}  // read from file at startup (trimmed)
//   token: {ref: {path: "ci/github", key: "token"}}  // external Vault ref
message SecretRef {
  oneof source {
    string      value = 1;
    string      file  = 3;  // path to a file whose contents are the secret value
    ExternalRef ref   = 2;
  }
}

message ExternalRef {
  string path = 1;
  string key = 2;
}
