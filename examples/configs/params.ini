; Example config file — INI format.
; VarTrack parses .ini files and writes each section.key to the sink.

[app]
name    = my-service
version = 1.0.0
env     = production
debug   = false

[server]
host    = 0.0.0.0
port    = 8080
workers = 4
timeout = 30

[database]
host     = prod-db.internal
port     = 5432
name     = myapp
user     = app-user
; @secret annotation — resolved from Vault at ETL time.
password = @secret(secret/myapp/db#password)
pool     = 20
ssl      = true

[cache]
host = redis.internal
port = 6379
db   = 0
ttl  = 3600

[logging]
level  = info
format = json
