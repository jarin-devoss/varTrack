# configs/app_with_secrets.yaml
#
# Config file that uses @secret() annotations.
# varTrack resolves each @secret() path against HashiCorp Vault
# before writing to any sink — the Vault value arrives at the sink,
# not the path string shown here.
#
# Vault setup:
#   vault kv put secret/myapp/db   password=supersecret123 max_connections=50
#   vault kv put secret/myapp/api  stripe_key=sk_live_xxx sendgrid_key=SG.xxx
#   vault kv put secret/myapp/auth jwt_secret=jwtsecret123 refresh_secret=refreshsecret456

app_port: 8080
log_level: info

feature:
  dark_mode: true
  new_onboarding: false

database:
  host: prod-db.internal
  port: 5432
  password: "@secret(secret/myapp/db#password)"       # resolved from Vault
  max_connections: "@secret(secret/myapp/db#max_connections)"
  min_connections: 5

api:
  stripe_key:    "@secret(secret/myapp/api#stripe_key)"   # resolved from Vault
  sendgrid_key:  "@secret(secret/myapp/api#sendgrid_key)" # resolved from Vault
  payments_url:  "https://payments.prod.internal/v2"

auth:
  jwt_secret:                "@secret(secret/myapp/auth#jwt_secret)"     # auth-vault
  refresh_secret:            "@secret(secret/myapp/auth#refresh_secret)" # auth-vault
  access_token_ttl_seconds:  3600
  refresh_token_ttl_seconds: 604800

cache:
  ttl_seconds: 300
  max_keys: 10000

otel:
  endpoint:     "http://otel-collector:4317"
  service_name: "myapp"
