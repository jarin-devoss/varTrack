receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 512
  resource:
    attributes:
      - action: insert
        key: cluster
        value: vartrack-e2e

exporters:
  # Traces → Jaeger via OTLP gRPC
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # Metrics → Prometheus scrape endpoint (port 8889)
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: otel
    resource_to_telemetry_conversion:
      enabled: true

  # Debug: log every span/metric to collector stdout (remove in prod)
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [otlp/jaeger, debug]
    metrics:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [prometheus]
