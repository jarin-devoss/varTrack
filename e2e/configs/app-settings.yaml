# Demo application configuration managed by VarTrack
# Nested groups → nested ZooKeeper znodes via slash key_format:
#   database.pool_size → /vartrack/demo/zookeeper/default/database/pool_size
#   cache.ttl_seconds  → /vartrack/demo/zookeeper/default/cache/ttl_seconds

app:
  name: demo-app
  region: us-east-1
  env: production

database:
  pool_size: "10"
  max_connections: "100"
  connect_timeout_ms: "5000"
  password: "placeholder-rotated-by-vault"

cache:
  ttl_seconds: "300"
  backend: redis

api:
  rate_limit: "1000"
  timeout_ms: "30000"
  version: v1
  secret_key: "placeholder-rotated-by-vault"

features:
  dark_mode: "true"
  analytics: "false"
  debug_mode: "false"

observability:
  log_level: INFO
  service_mesh: istio
  tracing_enabled: "true"
