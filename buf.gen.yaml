version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: gateway-service/internal/gen/proto/go
    # Route google/rpc protos to the canonical Go module package.
    - file_option: go_package
      path: google/rpc/status.proto
      value: google.golang.org/genproto/googleapis/rpc/status;status
    - file_option: go_package
      path: google/rpc/code.proto
      value: google.golang.org/genproto/googleapis/rpc/code;code
    - file_option: go_package
      path: google/api/field_behavior.proto
      value: google.golang.org/genproto/googleapis/api/annotations;annotations
    - file_option: go_package
      path: google/api/annotations.proto
      value: google.golang.org/genproto/googleapis/api/annotations;annotations

plugins:
  # --- GO GENERATION ---
  - remote: buf.build/protocolbuffers/go:v1.34.2
    out: gateway-service/internal/gen/proto/go
    opt: paths=source_relative

  - remote: buf.build/grpc/go:v1.5.1
    out: gateway-service/internal/gen/proto/go
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false

  # --- PYTHON GENERATION ---
  - remote: buf.build/protocolbuffers/python:v27.3
    out: orchestrator-service/app/generated/proto/python

  - remote: buf.build/protocolbuffers/pyi:v27.3
    out: orchestrator-service/app/generated/proto/python

  - remote: buf.build/grpc/python:v1.65.0
    out: orchestrator-service/app/generated/proto/python